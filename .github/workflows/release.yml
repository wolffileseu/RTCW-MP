name: Release

# Builds release archives and publishes a GitHub Release when a version tag
# is pushed (e.g. `git tag v1.0.0-tracker && git push origin v1.0.0-tracker`).
#
# RTCW-MP (original id source) revived with a modern GCC 32-bit build, plus the
# engine-side mod-independent Wolffiles tracker.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ----------------------------------------------------------- Linux x86 (32)
  linux:
    name: Linux x86 (32-bit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install 32-bit toolchain + nasm
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y gcc-multilib libc6-dev-i386 nasm zip

      - name: Build server + qagame
        run: |
          cd src
          make -f Makefile.ded -j"$(nproc)"

      - name: Stage release files
        run: |
          OUT=stage/rtcw-mp-tracker-linux-x86
          mkdir -p "$OUT/main"
          cp build-ded/wolfded.x86             "$OUT/"
          cp build-ded/main/qagame.mp.i386.so  "$OUT/main/"
          cp README.txt COPYING.txt            "$OUT/" 2>/dev/null || true
          ls -laR "$OUT"

      - name: Zip
        run: |
          cd stage
          zip -r ../rtcw-mp-tracker-linux-x86.zip rtcw-mp-tracker-linux-x86

      - uses: actions/upload-artifact@v4
        with:
          name: rtcw-mp-tracker-linux-x86
          path: rtcw-mp-tracker-linux-x86.zip
          if-no-files-found: error

  # ------------------------------------------------------------------ Release
  release:
    name: Publish GitHub Release
    needs: [linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Show artifacts
        run: find dist -type f

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*.zip
          generate_release_notes: true
          body: |
            ## RtCW-MP (Wolffiles tracker build)

            The **original id Software Return to Castle Wolfenstein multiplayer**
            dedicated server, revived with a modern 32-bit GCC build, plus the
            engine-side **mod-independent** Wolffiles tracker (score / ping /
            team / kills for any RtCW mod — no mod changes required).

            **Contents (Linux):**
            - `wolfded.x86` — dedicated server with tracker
            - `main/qagame.mp.i386.so` — game module

            **Enable tracking** on your server:
            ```
            +set sv_tracker <host>:<port>
            ```

            Built from tag `${{ github.ref_name }}`.

            > Note: this is the original 1.41 source line, distinct from the
            > iortcw build. Windows binaries will follow in a later release.
